<!DOCTYPE html>
<html>
<head>
    <title>MMSCE Smart Attendance - GPS Verified</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; text-align: center; margin: 0; padding: 0; }
        
        /* Welcome Screen */
        #welcomeScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a2a6c; color: white; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 2000; transition: 0.5s;
        }
        .enter-btn {
            background: #f1c40f; color: #1a2a6c; border: none; padding: 15px 40px;
            font-size: 20px; font-weight: bold; border-radius: 50px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: 0.3s;
        }

        /* Attendance View */
        .header { background: white; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; position: sticky; top: 0; z-index: 1000; }
        #locationStatus { font-weight: bold; margin: 10px auto; padding: 10px; border-radius: 8px; max-width: 500px; }
        .on-campus { background: #d4edda; color: #155724; }
        .off-campus { background: #f8d7da; color: #721c24; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; max-width: 1400px; margin: auto; padding: 20px; }
        .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; align-items: center; transition: 0.4s; border: 1px solid #ddd; }
        .name-text { flex-grow: 1; text-align: left; font-weight: bold; font-size: 14px; color: #2c3e50; }
        .btn-group { display: flex; gap: 8px; }
        button.action-btn { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; font-size: 16px; transition: 0.2s; }
        .btn-p { background: #27ae60; } 
        .btn-a { background: #e74c3c; } 
        .disabled { background: #ccc !important; cursor: not-allowed; opacity: 0.5; }
        .disappear { opacity: 0; transform: translateY(-20px); pointer-events: none; transition: 0.4s; }
    </style>
</head>
<body>

<div id="welcomeScreen">
    <h1>Welcome to MMSCE<br>આપનો દિવસ શુભ રહે !</h1>
    <button class="enter-btn" onclick="startSystem()">Mark Your Attendance</button>
</div>

<div id="mainContent" style="display:none;">
    <div class="header">
        <h1>Smt. M. M. Shah College of Education</h1>
        <div id="locationStatus">Checking GPS...</div>
    </div>
    <div class="grid" id="attendanceGrid"></div>
</div>

<script>
    // 1. USE YOUR CURRENT WORKING WEB APP URL
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwonbVeT0JvQZFt13jwZECyDwTWqIwfqNtVfO8hx1Jb3Cg7X6Ibc84Hl74zHMRhOwE/exec";

    // 2. YOUR PROVIDED COLLEGE COORDINATES
    const COLLEGE_LAT = 22.720343216762977; 
    const COLLEGE_LON = 71.65218912589522;
    const MAX_DISTANCE = 0.2; // 200 Meters

    const students = [
        "1 BAMBHANIYA VARUN", "2 BARAIYA RAMDEV", "3 BAVLIYA JAYDEEPBHAI", "4 BHADANIYA RITAXI", 
        "5 BHUVA YAISHA", "6 CHATUR SNEHA", "7 CHAUHAN KRISHNA", "8 CHAUHAN SMITKUMAR", 
        "9 CHAVDA YASH", "10 DALOLIYA SHILPABEN", "11 DAXINI HETVI", "12 Dumadiya Sanjay", 
        "13 GADHVI HINAL", "15 Gami Rahul", "16 GOSAI POOJA", "17 JAMBUKIYA ASMITABEN", 
        "18 Janadiya Dhiraj", "19 KHAKHI MITALBEN", "20 LIMBADIYA KOMALBEN", "21 MAHERIYA VARSHABEN", 
        "22 MAHERIYA YOGESHKUMAR", "23 MAKWANA DOLLY", "24 MALAKIYA SWITYBEN", "25 MANANI ALKABEN", 
        "26 MANSURI ARMAN", "27 Mehta Vishvaben", "28 MITHAPARA VANRAJBHAI", "29 MORI MANSHI", 
        "30 NAKIYA GEETABEN", "31 NAKIYA NIKITABEN", "32 NAKIYA SIDDHIBEN", "33 PALANI JAHANVIBEN", 
        "34 Parmar Aman", "35 PARMAR ARTI", "36 PARMAR RESHMA", "37 RANA MADHAVSINH", 
        "38 RATHOD KISMATBEN", "39 RATHOD NARENDRABHAI", "40 JADAV PRIYABEN", "41 Rojasara Kinjal", 
        "42 SARVAIYA JAYESH", "43 SATANI AASHISHKUMAR", "44 SOLANKI HITIXA", "45 SOLANKI JAYSHRIBEN", 
        "46 SOLANKI VAIBHAV", "47 Sumra Farhin", "48 THIM ZEEYA", "49 CHAUHAN TEJASHREEBEN", 
        "50 TRIVEDI NISHTHA", "51 VAGHELA DEVANSHIBA", "52 Vakhariya Dhara", "53 ZALA KOMALBA"
    ];

    let canMark = false;
    const clickSound = new Audio('https://www.soundjay.com/buttons/button-16.mp3');

    function startSystem() {
        document.getElementById('welcomeScreen').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            initGPS();
            renderGrid();
        }, 500);
    }

    function initGPS() {
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(updateLocation, handleError, {enableHighAccuracy: true});
        }
    }

    function updateLocation(pos) {
        const dist = calculateDistance(pos.coords.latitude, pos.coords.longitude, COLLEGE_LAT, COLLEGE_LON);
        const statusDiv = document.getElementById('locationStatus');
        
        if (dist <= MAX_DISTANCE) {
            statusDiv.innerText = "📍 ON CAMPUS: Verified";
            statusDiv.className = "on-campus";
            canMark = true;
        } else {
            statusDiv.innerText = "❌ OFF CAMPUS: Attendance Disabled";
            statusDiv.className = "off-campus";
            canMark = false;
        }
        renderGrid();
    }

    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371; 
        const dLat = (lat2-lat1) * Math.PI / 180;
        const dLon = (lon2-lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function renderGrid() {
        const grid = document.getElementById('attendanceGrid');
        grid.innerHTML = "";
        students.forEach((name) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="name-text">${name}</div>
                <div class="btn-group">
                    <button class="action-btn btn-p ${!canMark ? 'disabled' : ''}" onclick="mark('${name}', 'P', this)">P</button>
                    <button class="action-btn btn-a ${!canMark ? 'disabled' : ''}" onclick="mark('${name}', 'A', this)">A</button>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function mark(name, status, btn) {
        if (!canMark) return alert("Verification failed. You must be at the college.");
        
        clickSound.play();
        const card = btn.closest('.card');
        card.classList.add('disappear');

        fetch(SCRIPT_URL, { 
            method: 'POST', 
            mode: 'no-cors', 
            body: JSON.stringify({ name: name, status: status }) 
        });

        const msg = new SpeechSynthesisUtterance(name.split(' ').slice(1).join(' ') + " marked " + (status === 'P' ? 'Present' : 'Absent'));
        window.speechSynthesis.speak(msg);

        setTimeout(() => { card.style.display = 'none'; }, 400);
    }

    function handleError() { 
        document.getElementById('locationStatus').innerText = "Please enable GPS to proceed.";
        document.getElementById('locationStatus').className = "off-campus";
    }
</script>
</body>
</html>
