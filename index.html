<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMSCE Attendance Portal</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background-color: #eef2f3; padding: 20px; }
        .container { max-width: 450px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .quote { font-style: italic; color: #555; margin: 15px 0; font-size: 0.95em; min-height: 40px; border-left: 4px solid #27ae60; padding-left: 10px; text-align: left; }
        select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; }
        .btn-p { background-color: #27ae60; color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-view { background-color: #3498db; color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; margin-top: 20px; cursor: pointer; text-decoration: none; display: inline-block; }
        .warning { color: #e74c3c; font-weight: bold; display: block; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="margin-bottom:5px;">MMSCE Portal</h2>
    <p style="color:#7f8c8d; margin-top:0;">Smt. M. M. Shah College of Education</p>
    
    <div id="quoteDisplay" class="quote">"Loading inspiration..."</div>
    <hr>
    
    <span id="timeWarning" class="warning"></span>
    
    <select id="studentSelect">
        <option value="">-- Select Your Name --</option>
        <option>1 BAMBHANIYA VARUN</option><option>2 BARAIYA RAMDEV</option><option>3 BAVLIYA JAYDEEPBHAI</option>
        <option>4 BHADANIYA RITAXI</option><option>5 BHUVA YAISHA</option><option>6 CHATUR SNEHA</option>
        <option>7 CHAUHAN KRISHNA</option><option>8 CHAUHAN SMITKUMAR</option><option>9 CHAVDA YASH</option>
        <option>10 DALOLIYA SHILPABEN</option><option>11 DAXINI HETVI</option><option>12 Dumadiya Sanjay</option>
        <option>13 GADHVI HINAL</option><option>15 Gami Rahul</option><option>16 GOSAI POOJA</option>
        <option>17 JAMBUKIYA ASMITABEN</option><option>18 Janadiya Dhiraj</option><option>19 KHAKHI MITALBEN</option>
        <option>20 LIMBADIYA KOMALBEN</option><option>21 MAHERIYA VARSHABEN</option><option>22 MAHERIYA YOGESHKUMAR</option>
        <option>23 MAKWANA DOLLY</option><option>24 MALAKIYA SWITYBEN</option><option>25 MANANI ALKABEN</option>
        <option>26 MANSURI ARMAN</option><option>27 Mehta Vishvaben</option><option>28 MITHAPARA VANRAJBHAI</option>
        <option>29 MORI MANSHI</option><option>30 NAKIYA GEETABEN</option><option>31 NAKIYA NIKITABEN</option>
        <option>32 NAKIYA SIDDHIBEN</option><option>33 PALANI JAHANVIBEN</option><option>34 Parmar Aman</option>
        <option>35 PARMAR ARTI</option><option>36 PARMAR RESHMA</option><option>37 RANA MADHAVSINH</option>
        <option>38 RATHOD KISMATBEN</option><option>39 RATHOD NARENDRABHAI</option><option>40 JADAV PRIYABEN</option>
        <option>41 Rojasara Kinjal</option><option>42 SARVAIYA JAYESH</option><option>43 SATANI AASHISHKUMAR</option>
        <option>44 SOLANKI HITIXA</option><option>45 SOLANKI JAYSHRIBEN</option><option>46 SOLANKI VAIBHAV</option>
        <option>47 Sumra Farhin</option><option>48 THIM ZEEYA</option><option>49 CHAUHAN TEJASHREEBEN</option>
        <option>50 TRIVEDI NISHTHA</option><option>51 VAGHELA DEVANSHIBA</option><option>52 Vakhariya Dhara</option>
        <option>53 ZALA KOMALBA</option>
    </select>
    
    <button id="mainBtn" class="btn-p" onclick="getLocation()">Mark Presence (P)</button>
    
    <a href="https://script.google.com/macros/s/AKfycbzn2SCJpeBna2dJYB-tRvtxnx2yRz3LvA_XIh73lN1p03m3XmLoga4NEtgqH6S5DzJH/exec" target="_blank" class="btn-view">View Attendance Sheet</a>
    
    <div id="statusMsg" style="margin-top:15px; font-weight:bold;"></div>
</div>

<script>
    const SCRIPT_URL = "PASTE_YOUR_NEW_APPS_SCRIPT_URL_HERE";
    
    const quotes = [
        "Education is the most powerful weapon which you can use to change the world.",
        "The beautiful thing about learning is that no one can take it away from you.",
        "Success is the sum of small efforts, repeated day in and day out.",
        "Teachers open the door, but you must enter by yourself.",
        "The expert in anything was once a beginner."
    ];

    const COLLEGE_LAT = 22.7230; 
    const COLLEGE_LON = 71.6350; 
    const MAX_DIST = 0.3; // 300m

    function isTimeValid() {
        const now = new Date();
        const hrs = now.getHours() + (now.getMinutes() / 60);
        return (hrs >= 11.25 && hrs <= 12.5); // 11:15 - 12:30
    }

    window.onload = function() {
        document.getElementById('quoteDisplay').innerText = '"' + quotes[Math.floor(Math.random() * quotes.length)] + '"';
        const lock = localStorage.getItem("locked_" + new Date().toLocaleDateString());
        if (lock) {
            document.getElementById('mainBtn').disabled = true;
            document.getElementById('statusMsg').innerText = "Presence already marked!";
        } else if (!isTimeValid()) {
            document.getElementById('mainBtn').disabled = true;
            document.getElementById('timeWarning').innerText = "Portal Closed (11:15 AM - 12:30 PM)";
        }
    };

    function getLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                const d = Math.sqrt(Math.pow(pos.coords.latitude - COLLEGE_LAT, 2) + Math.pow(pos.coords.longitude - COLLEGE_LON, 2)) * 111;
                if (d <= MAX_DIST) submit();
                else alert("Please mark attendance from inside the college campus!");
            }, () => alert("GPS is required for attendance. Please enable location."));
        }
    }

    function submit() {
        const name = document.getElementById('studentSelect').value;
        if (!name) return alert("Select your name!");
        
        document.getElementById('mainBtn').disabled = true;
        document.getElementById('statusMsg').innerText = "Saving to sheet...";

        fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({name: name, status: "P"}) })
        .then(() => {
            document.getElementById('statusMsg').innerHTML = "<span style='color:green;'>✅ Attendance Recorded!</span>";
            localStorage.setItem("locked_" + new Date().toLocaleDateString(), "true");
        });
    }
</script>
</body>
</html>
